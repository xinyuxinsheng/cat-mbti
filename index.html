<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>喵格测试 · 猫咪MBTI</title>
  <meta name="description" content="猫咪MBTI测试：24 个问题，测出主子的真实猫格。">
  <meta http-equiv="refresh" content="1;url=v2/">
  <script>
    // 主入口重定向到 v2（档案馆版）。
    // 兼容 v1 时代的旧分享链接：match/mname → v2 的 fcode/fname
    (function () {
      var p = new URLSearchParams(location.search);
      var q = new URLSearchParams();
      if (p.get('match')) q.set('fcode', p.get('match'));
      if (p.get('mname')) q.set('fname', p.get('mname'));
      p.forEach(function (v, k) {
        if (k !== 'match' && k !== 'mname') q.set(k, v);
      });
      var qs = q.toString();
      location.replace('v2/' + (qs ? '?' + qs : ''));
    })();
  </script>
  <style>
    body { font-family: -apple-system, "PingFang SC", sans-serif; background: #f2e7cd;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .tip { text-align: center; color: #6f5c44; font-size: 14px; }
    a { color: #b23a2c; }
  </style>
</head>
<body>
  <div class="tip">
    <p>🐾 正在进入喵格研究所……</p>
    <noscript><p><a href="v2/">点此进入</a></p></noscript>
  </div>
</body>
</html>
